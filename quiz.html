<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzzzz</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background-color: #EEF4FF;
    }

    .btn {
      padding: 15px 20px;
      border-radius: 12px;
      font-weight: 700;
      background-color: #ffffff;
      border: 2px solid #e5e7eb;
      border-bottom: 5px solid #d1d5db;
      color: #374151;
      position: relative;
      top: 0;
    }

    .btn:active:not(:disabled) {
      top: 3px;
      border-bottom-width: 2px;
    }

    .btn-correct {
      background-color: #d7ffb8 !important;
      border-color: #a3e635 !important;
      border-bottom-color: #85c916 !important;
      color: #2f6a06 !important;
    }

    .btn-incorrect {
      background-color: #ffdfe0 !important;
      border-color: #ff9c9c !important;
      border-bottom-color: #ff6b6b !important;
      color: #b91c1c !important;
      animation: shake 0.4s;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-6px);
      }

      75% {
        transform: translateX(6px);
      }
    }

    .progress-track {
      width: 100%;
      height: 14px;
      background-color: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #58cc02, #7ed321);
      border-radius: 999px;
      transition: width 500ms ease;
    }

    .card-shadow {
      box-shadow: 0 8px 0 #e2e8f0;
    }

    .mascot {
      border-radius: 24px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      flex-shrink: 0;
    }

    .mascot-normal {
      background-image: url('img/normal.png');
    }

    .mascot-happy {
      background-image: url('img/happy.png');
    }

    .mascot-sad {
      background-image: url('img/sad.png');
    }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      top: 0;
      left: 0;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confetti-fall 900ms ease-out forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: var(--confetti-end) rotate(var(--confetti-spin));
        opacity: 0;
      }
    }
  </style>
</head>

<body class="h-screen overflow-hidden w-full flex justify-center items-center md:items-stretch px-4 md:px-0">
  <div id="card"
    class="w-full max-w-4xl max-h-full my-0 md:my-15 bg-white flex flex-col justify-between rounded-2xl md:rounded-4xl card-shadow border border-slate-100 px-5 py-5 md:px-12 md:py-10">
    <div class="w-full">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="w-full flex items-center gap-3 md:gap-10">
      <div class="mascot mascot-normal w-12 h-12 md:w-40 md:h-40" id="mascot"></div>
      <div class="flex-1 text-base md:text-2xl font-bold text-slate-800 text-left" id="question"></div>
    </div>
    <div class="h-6 flex items-center justify-center w-full">
      <p id="message" class="font-semibold"></p>
    </div>
    <div class="w-full grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4" id="buttons">

    </div>
  </div>
  <script src="./quiz.js"></script>
</body>

</html>

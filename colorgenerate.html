<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Color Generator</title>
</head>

<body>
  <div class="flex flex-col justify-center items-center h-screen">
    <div id="square"
      class="w-[300px] mb-2 aspect-square bg-slate-100 border border-2 rounded border-slate-400 flex justify-center items-center">
      Hey
    </div>
    <div id="circles" class="flex gap-4">
    </div>
    <label class="mt-2">Click to copy hex code</label>
    <div class="flex gap-4">
      <button onclick="savePalette()"
        class="mt-3 mb-3 bg-slate-200 px-3 py-2 rounded-md hover:scale-110 transition-all duration-200 active:scale-100">Save
        Palette</button>
      <button onclick="newPalette()"
        class="mt-3 mb-3 bg-red-200 px-3 py-2 rounded-md hover:scale-110 transition-all duration-200 active:scale-100">Refresh
        Palette</button>
    </div>
    <div id="palettes" class="min-w-3xl p-4 border-2 border-slate-400 flex gap-8">
    </div>
  </div>
  <script>
    function randomHex() {
      const chars = "abcdef0123456789"
      let hex = "#"
      for (let i = 0; i < 6; i++) {
        const rand = Math.floor(Math.random() * 16)
        const newchar = chars[rand]

        hex = hex + newchar
      }
      return hex
    }
    function randCircle() {
      const container = document.getElementById('circles')
      const square = document.getElementById('square')
      for (let i = 0; i < 6; i++) {
        const hex = randomHex()
        const circle = document.createElement('div')
        circle.style.backgroundColor = hex
        circle.dataset.hex = hex
        circle.classList.add('rounded-full', 'w-[30px]', 'aspect-square', 'cursor-pointer', 'circle', 'hover:scale-125', 'active:scale-95', 'transition-all', 'duration-200')
        container.append(circle)

        const bg = circle.dataset.hex
        const text = getTextColor(bg)
        circle.addEventListener('mouseenter', () => {
          square.style.backgroundColor = bg
          square.innerText = bg
          square.style.color = text
        })
        circle.addEventListener('mouseleave', () => {
          square.style.backgroundColor = "#f1f5f9"
          square.innerText = "Hover for Hex codes"
          square.style.color = "black"
        })
        circle.addEventListener('click', () => {
          navigator.clipboard.writeText(bg).then(() => {
            square.innerText = "Copied!"
          })
        })
      }
    }
    randCircle()

    let paletteCount = 0
    function savePalette() {
      const palette = document.getElementById('palettes')
      paletteCount++
      const container = document.createElement('div')
      container.classList.add('flex', 'flex-col')
      palette.appendChild(container)
      const label = document.createElement('label')
      label.classList.add('text-center')
      container.appendChild(label)
      label.innerText = "Palette " + paletteCount
      const container2 = document.createElement('div')
      container2.classList.add('flex', 'flex-row')
      container.appendChild(container2)
      const circles = document.querySelectorAll('.circle')
      circles.forEach(circle => {
        const bg = circle.dataset.hex
        const text = getTextColor(bg)
        const swatch = document.createElement('div')
        swatch.classList.add('h-[100px]', 'w-[30px]', '[writing-mode:vertical-rl]', 'rotate-180', 'self-center', 'text-center')
        swatch.style.backgroundColor = bg
        swatch.innerText = bg
        swatch.style.color = text
        container2.appendChild(swatch)
      })
    }

    function newPalette() {
      const circles = document.getElementById('circles')
      circles.innerHTML = ""
      randCircle()
    }

    function getTextColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16)
      const g = parseInt(hex.slice(3, 5), 16)
      const b = parseInt(hex.slice(5, 7), 16)

      const brightness = (r * 299 + g * 587 + b * 114) / 1000
      if (brightness < 128) {
        return "white"
      }
      else {
        return "black"
      }
    }
  </script>
</body>

</html>

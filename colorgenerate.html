<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>Color Generator</title>
  <style>
    @keyframes scalePulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    .circle-pulse {
      animation: scalePulse 0.8s ease-in-out infinite;
    }
  </style>
</head>

<body>
  <div class="h-screen flex flex-row overflow-hidden">
    <div class="flex flex-col justify-center items-center w-1/2">
      <div class="flex flex-row gap-4 items-center">

        <div class="flex flex-col items-center">
          <div id="square"
            class="w-[300px] mb-2 aspect-square bg-slate-100 border-2 rounded border-slate-400 flex justify-center items-center">
            Hey
          </div>
          <div id="circles" class="flex gap-4"></div>
          <label class="mt-2">Click to copy hex code</label>
          <button onclick="savePalette()"
            class="mt-3 mb-3 bg-slate-200 px-3 py-2 rounded-md hover:scale-110 transition-all duration-200 active:scale-100">
            Save Palette
          </button>
        </div>

        <div class="flex flex-col gap-4">
          <div class="relative group inline-flex" onclick="newPalette()">
            <div
              class="text-slate-600 bg-slate-100 p-2 rounded-md cursor-pointer inline-flex hover:scale-110 active:scale-95 transition-all duration-200 active:bg-blue-200 active:text-blue-500">
              <i data-lucide="refresh-cw"></i>
            </div>
            <span
              class="absolute left-full top-1/2 -translate-y-1/2 ml-2 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">
              Refresh palette
            </span>
          </div>
          <div class="relative group inline-flex" id="pin" onclick="togglePinMode()">
            <div id="pinbtn"
              class="text-slate-600 bg-slate-100 p-2 rounded-md cursor-pointer inline-flex hover:scale-110 active:scale-95 transition-all duration-200">
              <i data-lucide="pin"></i>
            </div>
            <span
              class="absolute left-full top-1/2 -translate-y-1/2 ml-2 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">
              Pin color
            </span>
          </div>
          <div class="relative group inline-flex">
            <div
              class="text-slate-600 bg-slate-100 p-2 rounded-md cursor-pointer inline-flex hover:scale-110 active:scale-95 transition-all duration-200 active:bg-purple-200 active:text-purple-500">
              <i data-lucide="arrow-right-left"></i>
            </div>
            <span
              class="absolute left-full top-1/2 -translate-y-1/2 ml-2 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">
              Change a color
            </span>
          </div>
        </div>

      </div>
    </div>

    <div class="w-1/2">
      <label class="block w-full text-center p-6 text-xl font-medium">Your Saved Palettes will appear here</label>
      <div id="palettes" class="p-4 flex gap-8 flex-wrap">
      </div>
    </div>
  </div>

  <script>
    let isPinned = false
    let isSwiched = false
    const pinned = []

    function randomHex() {
      const chars = "abcdef0123456789"
      let hex = "#"
      for (let i = 0; i < 6; i++) {
        const rand = Math.floor(Math.random() * 16)
        const newchar = chars[rand]

        hex = hex + newchar
      }
      return hex
    }
    function randCircle() {
      const container = document.getElementById('circles')
      const square = document.getElementById('square')
      for (let i = 0; i < 6; i++) {
        const hex = randomHex()
        const circle = document.createElement('div')
        circle.style.backgroundColor = hex
        circle.dataset.hex = hex
        circle.classList.add('rounded-full', 'w-[30px]', 'aspect-square', 'cursor-pointer', 'circle', 'hover:scale-125', 'active:scale-95', 'transition-all', 'duration-200', 'relative')
        container.append(circle)

        const bg = circle.dataset.hex
        const text = getTextColor(bg)
        circle.addEventListener('mouseenter', () => {
          square.style.backgroundColor = bg
          square.innerText = bg
          square.style.color = text
        })
        circle.addEventListener('mouseleave', () => {
          square.style.backgroundColor = "#f1f5f9"
          square.innerText = "Hover for Hex codes"
          square.style.color = "black"
        })
        circle.addEventListener('click', () => {
          if (circle.dataset.pinned === "true" && isPinned) {
            const span = circle.querySelector('span')
            span.remove()
            circle.dataset.pinned = "false"
            square.innerText = "Color Unpinned"
          }
          else if (isPinned) {
            circle.classList.remove('circle-pulse')
            const pin = document.createElement('span')
            pin.classList.add('absolute', 'inset-0', 'flex', 'items-center', 'justify-center', 'pointer-events-none')
            pin.innerHTML = '<i data-lucide="pin" style="width:16px; height:16px;"></i>'

            circle.appendChild(pin)
            lucide.createIcons()
            circle.dataset.pinned = "true"
            pin.style.color = text
            square.innerText = "Color Pinned!"
            togglePinMode()
          } else {

            navigator.clipboard.writeText(bg).then(() => {
              square.innerText = "Copied!"
            })
          }
        })
      }
    }
    randCircle()

    let paletteCount = 0
    function savePalette() {
      const palette = document.getElementById('palettes')
      paletteCount++
      const container = document.createElement('div')
      container.classList.add('flex', 'flex-col')
      palette.appendChild(container)
      const label = document.createElement('label')
      label.classList.add('text-center')
      container.appendChild(label)
      label.innerText = "Palette " + paletteCount
      const container2 = document.createElement('div')
      container2.classList.add('flex', 'flex-row')
      container.appendChild(container2)
      const circles = document.querySelectorAll('.circle')
      circles.forEach(circle => {
        const bg = circle.dataset.hex
        const text = getTextColor(bg)
        const swatch = document.createElement('div')
        swatch.classList.add('h-[100px]', 'w-[30px]', '[writing-mode:vertical-rl]', 'rotate-180', 'self-center', 'text-center')
        swatch.style.backgroundColor = bg
        swatch.innerText = bg
        swatch.style.color = text
        container2.appendChild(swatch)
      })
    }

    function newPalette() {
      const circles = document.querySelectorAll('.circle')
      circles.forEach((circle, index) => {
        if (circle.dataset.pinned === "true") {
          pinned[index] = circle.dataset.hex
        }
      })
      const container = document.getElementById('circles')
      container.innerHTML = ""
      randCircle()
      const newCircles = document.querySelectorAll('.circle')
      newCircles.forEach((circle, index) => {
        if (pinned[index]) {
          circle.style.backgroundColor = pinned[index]
          circle.dataset.hex = pinned[index]
          circle.dataset.pinned = "true"
          const pin = document.createElement('span')
          pin.classList.add('absolute', 'inset-0', 'flex', 'items-center', 'justify-center', 'pointer-events-none')
          pin.innerHTML = '<i data-lucide="pin" style="width:16px; height:16px;"></i>'

          circle.appendChild(pin)
          lucide.createIcons()
          circle.dataset.pinned = "true"
          pin.style.color = getTextColor(pinned[index])

        }

      })
      pinned.length = 0
    }

    function getTextColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16)
      const g = parseInt(hex.slice(3, 5), 16)
      const b = parseInt(hex.slice(5, 7), 16)

      const brightness = (r * 299 + g * 587 + b * 114) / 1000
      if (brightness < 128) {
        return "white"
      }
      else {
        return "black"
      }
    }

    function togglePinMode() {
      const pin = document.getElementById('pin')
      const circles = document.querySelectorAll('.circle')
      const pinbtn = document.getElementById('pinbtn')

      isPinned = !isPinned

      if (isPinned) {
        pinbtn.classList.remove('text-slate-600', 'bg-slate-100')
        pinbtn.classList.add('text-red-600', 'bg-red-100')
        circles.forEach(circle => {
          circle.classList.add('circle-pulse')
        })
      } else {
        pinbtn.classList.remove('text-red-600', 'bg-red-100')
        pinbtn.classList.add('text-slate-600', 'bg-slate-100')
        circles.forEach(circle => {
          circle.classList.remove('circle-pulse')
        })
      }
    }
    lucide.createIcons();
  </script>
</body>

</html>

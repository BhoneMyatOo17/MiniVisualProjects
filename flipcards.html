<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Flip</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .flipcard {
      background-color: transparent;
      width: 200px;
      height: 300px;
    }

    .cardinner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .cardfront,
    .cardback {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      backface-visibility: hidden;
      border-radius: 12px;
    }

    .matched {
      box-shadow: 0 0 0px 10px #86efac;
      border-radius: 12px;
    }

    .cardfront {
      background-color: #ffa7a7;
      color: rgb(255, 255, 255);
      font-size: 120px;
    }

    .cardback {
      color: white;
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
  <div class="relative flex justify-center">
    <div class="absolute left-30 top-20">
      <p id="counter">Total Flips: 0</p>
    </div>

    <div class="max-w-2xl flex flex-wrap gap-8 mt-2">
      <div class="flipcard">
        <div class="cardinner" data-type="cat">
          <div class="cardfront">✧</div>
          <div class="cardback bg-purple-600">Cat</div>
        </div>
      </div>
      <div class="flipcard">
        <div class="cardinner" data-type="dog">
          <div class="cardfront">✧</div>
          <div class="cardback bg-yellow-800">Dog</div>
        </div>
      </div>
      <div class="flipcard">
        <div class="cardinner" data-type="fox">
          <div class="cardfront">✧</div>
          <div class="cardback bg-orange-600">Fox</div>
        </div>
      </div>
      <div class="flipcard">
        <div class="cardinner" data-type="dog">
          <div class="cardfront">✧</div>
          <div class="cardback bg-yellow-800">Dog</div>
        </div>
      </div>
      <div class="flipcard">
        <div class="cardinner" data-type="fox">
          <div class="cardfront">✧</div>
          <div class="cardback bg-orange-600">Fox</div>
        </div>
      </div>
      <div class="flipcard">
        <div class="cardinner" data-type="cat">
          <div class="cardfront">✧</div>
          <div class="cardback bg-purple-600">Cat</div>
        </div>
      </div>
    </div>
  </div>
  <script src="./flipcards.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Flip</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    .flipcard {
      background-color: transparent;
      width: 200px;
      height: 300px;
    }

    #card-container {
      flex-wrap: wrap;
      gap: 16px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .cardinner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .cardfront,
    .cardback {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      backface-visibility: hidden;
      border-radius: 12px;
      background-image:
        url('img/card-texture.jpeg'),
        linear-gradient(145deg, #9d0909, #7b1d1d);
      background-blend-mode: overlay;
      background-size: cover;
    }

    .matched {
      box-shadow: 0 0 0px 4px #86efac;
      border-radius: 12px;
    }

    .cardfront {
      background-color: #f19b9b;
      transform: translateZ(0);
    }

    .cardback {
      transform: rotateY(180deg);
      background-color: antiquewhite;
      font-family: "Press Start 2P", system-ui;
      font-weight: 300;
      font-style: normal;
    }

    .card-border {
      position: absolute;
      inset: 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cardfront .card-border {
      border: 3px solid whitesmoke;
    }

    .icon-front {
      font-size: 90px;
      color: white;
      margin: 0;
    }

    .icon {
      font-size: 60px;
    }

    .red {
      color: rgb(198, 30, 55);
    }

    .red .card-border {
      border: 3px solid rgb(198, 30, 55);
    }

    .black {
      color: black;
    }

    .black .card-border {
      border: 3px solid black;
    }
  </style>
</head>

<body>
  <p id="counter">Total Flips: 0</p>
  <div class="relative flex justify-center" id="card-container">
  </div>
  <script src="./flipcards.js"></script>
</body>

</html>
